<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawardha Cafe | VVIP</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .center { text-align: center; }
        .crown { font-size: 50px; display: block; }
        .logo { width: 140px; height: 140px; border: 3px solid #bf00ff; border-radius: 50%; margin: 10px auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #bf00ff; color: #bf00ff; font-weight: bold; font-size: 18px; }
        .vvip-text { color: #bf00ff; font-size: 26px; text-shadow: 0 0 10px #bf00ff; margin: 10px 0; font-weight: bold; }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #bf00ff; background: #111; color: #fff; border-radius: 12px; }
        
        .card { background: #1a1a1a; border: 2px solid #bf00ff; border-radius: 20px; padding: 15px; margin: 15px 0; display: flex; align-items: center; }
        .item-img { width: 90px; height: 90px; border-radius: 15px; border: 2px solid #bf00ff; margin-right: 15px; object-fit: cover; }
        .name { color: #bf00ff; font-weight: bold; font-size: 18px; margin-bottom: 8px; }
        
        .btn { width: 40px; height: 40px; border-radius: 50%; border: none; color: #fff; font-weight: bold; font-size: 20px; cursor: pointer; }
        .blue { background: #007bff; box-shadow: 0 0 10px #007bff; }
        .orange { background: #ff4500; box-shadow: 0 0 10px #ff4500; }
        
        .total { text-align: center; color: #bf00ff; font-size: 26px; margin: 20px 0; font-weight: bold; }
        .order-btn { width: 100%; padding: 20px; background: #bf00ff; border: none; border-radius: 15px; color: #fff; font-weight: bold; font-size: 20px; box-shadow: 0 0 15px #bf00ff; }
    </style>
</head>
<body>

    <div class="center">
        <span class="crown">👑</span>
        <div class="logo">Kawardha<br>Cafe</div>
        <div class="vvip-text">VVIP MENU</div>
    </div>

    <input type="text" class="input-box" placeholder="अपना नाम लिखें">
    <input type="text" class="input-box" placeholder="अपना पता लिखें">
    <input type="text" class="input-box" placeholder="मोबाइल नंबर">

    <div id="menu-items"></div>

    <div class="total">कुल: ₹0</div>
    <button class="order-btn">ऑर्डर कन्फर्म करें 🔥</button>

    <script>
        const menu = [
            { name: "Cheese Pizza", pS: 150, pL: 250, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200" },
            { name: "Veg Burger", pS: 60, pL: 100, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200" },
            { name: "Cold Coffee", pS: 80, pL: 120, img: "https://images.unsplash.com/photo-1541167760496-1628856ab779?w=200" },
            { name: "French Fries", pS: 50, pL: 90, img: "https://images.unsplash.com/photo-1573080496219-bbc088dc8f45?w=200" }
        ];

        let html = "";
        menu.forEach(item => {
            html += `
            <div class="card">
                <img src="${item.img}" class="item-img">
                <div style="flex:1">
                    <div class="name">${item.name}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                        <span style="font-size:14px;">छोटा (₹${item.pS})</span>
                        <div><button class="btn blue">-</button> <span style="margin:0 10px">0</span> <button class="btn blue">+</button></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:14px;">बड़ा (₹${item.pL})</span>
                        <div><button class="btn orange">-</button> <span style="margin:0 10px">0</span> <button class="btn orange">+</button></div>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('menu-items').innerHTML = html;
    </script>
</body>
</html>
