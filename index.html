<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kawardha Cafe | VVIP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:wght@600&display=swap');
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; padding: 10px; margin: 0; }
        
        .logo-box { text-align: center; margin-bottom: 15px; }
        .crown { font-size: 40px; display: block; filter: drop-shadow(0 0 8px #bf00ff); }
        .logo-circle { 
            width: 120px; height: 120px; border: 3px solid #bf00ff; border-radius: 50%; 
            margin: 5px auto; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px #bf00ff;
        }
        .logo-text { font-family: 'Lobster', cursive; color: #bf00ff; font-size: 20px; text-shadow: 0 0 10px #bf00ff; }
        .vvip-title { font-size: 28px; color: #bf00ff; text-shadow: 0 0 12px #bf00ff; margin: 10px 0; }

        .input-box { 
            width: 95%; margin: 5px auto; padding: 12px; border-radius: 12px; 
            border: 2px solid #ffcc00; display: block;
            background: #111; color: #fff; font-size: 15px; 
            box-shadow: 0 0 8px #ffcc00; box-sizing: border-box;
        }
        
        /* Jo dabba lock rahega uska style thoda alag dikhega taaki pata chale */
        .locked-box { 
            width: 95%; margin: 5px auto; padding: 12px; border-radius: 12px; 
            border: 2px solid #555; display: block;
            background: #1a1a1a; color: #888; font-size: 15px; 
            box-sizing: border-box; text-align: center; font-weight: bold;
        }
        
        .card { background: #111; padding: 12px; border-radius: 20px; border: 1.5px solid #bf00ff; margin: 0 auto 15px auto; width: 95%; display: flex; align-items: center; gap: 10px; box-shadow: 0 0 8px #bf00ff; box-sizing: border-box; }
        .item-img { width: 80px; height: 80px; border-radius: 15px; border: 2px solid #bf00ff; object-fit: cover; }
        
        .btn-qty { width: 38px; height: 38px; border-radius: 50%; border: none; color: white; font-weight: bold; font-size: 18px; }
        .blue-btn { background: #007bff; box-shadow: 0 0 10px #007bff; }
        .red-btn { background: #ff4500; box-shadow: 0 0 10px #ff4500; }
        
        .btn-send { width: 95%; margin: 10px auto; padding: 15px; background: #bf00ff; border: none; border-radius: 15px; font-weight: 900; font-size: 20px; color: white; display: block; box-shadow: 0 0 15px #bf00ff; }
    </style>
</head>
<body>

    <div class="logo-box">
        <span class="crown">👑</span>
        <div class="logo-circle"><div class="logo-text">Kawardha<br>Cafe</div></div>
        <h1 class="vvip-title">VVIP MENU</h1>
    </div>

    <input type="text" class="input-box" id="name" placeholder="अपना नाम लिखें">
    <input type="text" class="input-box" id="addr" placeholder="अपना पता लिखें">
    <input type="text" class="input-box" id="mob" placeholder="मोबाइल नंबर">
    
    <!-- Yeh raha locked dabba jisme pehle se 0 hai aur koi change nahi kar sakta -->
    <input type="text" class="locked-box" id="paid" value="Paid Amount: ₹0 (Udhaar)" disabled>

    <div id="itemsContainer"></div>
    <h2 id="totalDisplay" style="text-align:center; color:#bf00ff; font-size: 24px; margin: 10px 0;">कुल: ₹0</h2>
    <button class="btn-send" onclick="sendOrder()">ऑर्डर कन्फर्म करें 🔥</button>

    <script>
        const menu = [
            { name: "Cheese Pizza", pS: 150, pL: 250, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300" },
            { name: "Veg Burger", pS: 60, pL: 100, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300" },
            { name: "Cold Coffee", pS: 80, pL: 120, img: "https://images.unsplash.com/photo-1541167760496-1628856ab77a?w=300" },
            { name: "French Fries", pS: 50, pL: 90, img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300" }
        ];

        const container = document.getElementById('itemsContainer');
        menu.forEach((item, i) => {
            item.qtyS = 0; item.qtyL = 0;
            container.innerHTML += `
            <div class="card">
                <img src="${item.img}" class="item-img">
                <div style="flex-grow:1;">
                    <h3 style="margin:0 0 5px 0; color:#bf00ff; font-size: 16px;">${item.name}</h3>
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:5px;">
                        <span style="color:#007bff; font-size:12px; font-weight:bold;">छोटा (₹${item.pS})</span>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <button class="btn-qty blue-btn" onclick="upd(${i},'S',-1)">-</button>
                            <span id="s${i}" style="color:#007bff; font-size:18px; font-weight:bold;">0</span>
                            <button class="btn-qty blue-btn" onclick="upd(${i},'S',1)">+</button>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; justify-content:space-between;">
                        <span style="color:#ff4500; font-size:12px; font-weight:bold;">बड़ा (₹${item.pL})</span>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <button class="btn-qty red-btn" onclick="upd(${i},'L',-1)">-</button>
                            <span id="l${i}" style="color:#ff4500; font-size:18px; font-weight:bold;">0</span>
                            <button class="btn-qty red-btn" onclick="upd(${i},'L',1)">+</button>
                        </div>
                    </div>
                </div>
            </div>`;
        });

        function upd(i, s, v) {
            if(s=='S') { menu[i].qtyS = Math.max(0, menu[i].qtyS + v); document.getElementById('s'+i).innerText = menu[i].qtyS; }
            else { menu[i].qtyL = Math.max(0, menu[i].qtyL + v); document.getElementById('l'+i).innerText = menu[i].qtyL; }
            calc();
        }

        function calc() {
            let t = 0; menu.forEach(item => t += (item.qtyS * item.pS) + (item.qtyL * item.pL));
            document.getElementById('totalDisplay').innerText = "कुल: ₹" + t;
            return t;
        }

        function sendOrder() {
            let n = document.getElementById('name').value;
            let a = document.getElementById('addr').value; 
            let m = document.getElementById('mob').value;
            
            if(!n || !m || !a) { alert("कृपया नाम, पता और मोबाइल नंबर भरें!"); return; }
            
            let totalAmount = calc();
            let itemsOrdered = [];
            let msg = `*KAWARDHA CAFE VVIP ORDER*\nनाम: ${n}\nपता: ${a}\nमोबाइल: ${m}\n\n`; 
            
            menu.forEach(item => {
                if(item.qtyS > 0) {
                    msg += `• ${item.name} (छोटा): ${item.qtyS}\n`;
                    itemsOrdered.push(`${item.name} (S: ${item.qtyS})`);
                }
                if(item.qtyL > 0) {
                    msg += `• ${item.name} (बड़ा): ${item.qtyL}\n`;
                    itemsOrdered.push(`${item.name} (L: ${item.qtyL})`);
                }
            });

            if(itemsOrdered.length === 0) {
                alert("कृपया कम से कम एक आइटम चुनें!");
                return;
            }

            msg += "\n" + document.getElementById('totalDisplay').innerText;

            // --- Google Sheet Data Sending Code (Paid amount is hardcoded to 0) ---
            let scriptURL = "https://script.google.com/macros/s/AKfycbz-sYzWhTQaHS46CLWiQOp9-r-1-GGmLYZP065Wq5gnRw63HxytHYt2z563qu7zxnwH5w/exec";
            
            let orderData = {
                customerName: n + " (पता: " + a + ")",
                phoneNumber: m,
                itemDetails: itemsOrdered.join(', '),
                totalAmount: totalAmount,
                paidAmount: 0 
            };

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(orderData)
            })
            .then(res => res.json())
            .then(data => console.log('Success:', data))
            .catch(error => console.error('Error!', error));

            // --- WhatsApp Redirect ---
            window.open("https://wa.me/916264917767?text=" + encodeURIComponent(msg), '_blank');
        }
    </script>
</body>
</html>
